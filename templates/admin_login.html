<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Science Assistant</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:linear-gradient(135deg,#0d3d28,#1a5f3f,#2d8659);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:white;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{width:64px;height:64px;background:linear-gradient(135deg,#1a5f3f,#2d8659);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.8rem;color:white}
.login-logo h2{font-size:1.2rem;color:#1a5f3f;font-weight:700}
.login-logo p{font-size:.85rem;color:#6b7280;margin-top:4px}
.form-group{margin-bottom:18px}
label{display:block;font-size:.875rem;font-weight:600;color:#374151;margin-bottom:6px}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:11px 14px 11px 40px;border:1px solid #e5e7eb;border-radius:8px;font-size:.95rem;font-family:inherit;outline:none;transition:.2s}
.input-wrap input:focus{border-color:#1a5f3f;box-shadow:0 0 0 3px rgba(26,95,63,.1)}
.input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9ca3af}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#1a5f3f,#2d8659);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;margin-top:4px}
.btn-login:hover{opacity:.9}
.error-msg{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:.875rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="icon"><i class="fas fa-robot"></i></div>
    <h2>Science Assistant</h2>
    <p>เข้าสู่ระบบผู้ดูแล</p>
  </div>
  {% if error %}
  <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
  {% endif %}
  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label>ชื่อผู้ใช้</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="username" required autofocus>
      </div>
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="password" required>
      </div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ</button>
  </form>
</div>
</body>
</html>
